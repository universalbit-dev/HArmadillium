name: Snyk Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'   # Weekly on Monday at 02:00 UTC (reduces noise vs daily)
  workflow_dispatch:
    inputs:
      severity_threshold:
        description: 'Snyk severity threshold (low/medium/high/critical)'
        required: false
        default: 'medium'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true   # Avoid stacking duplicate runs on rapid pushes

jobs:
  snyk-scan:
    name: Snyk – Dependency & Code Scan
    runs-on: ubuntu-latest
    environment: snyk

    permissions:
      contents: read
      security-events: write   # Required to upload SARIF results
      actions: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js setup with dependency caching ──────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: workers/package-lock.json

      # ── 3. Install project dependencies ───────────────────────────────────
      - name: Install dependencies in workers
        working-directory: ./workers
        run: npm ci   # Prefer ci over install for reproducible installs

      # ── 4. Snyk vulnerability test (open-source) ──────────────────────────
      - name: Run Snyk test – open source vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true   # Don't block CI; results go to Security tab
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --all-projects
            --severity-threshold=${{ github.event.inputs.severity_threshold || 'medium' }}
            --sarif-file-output=snyk-oss.sarif

      # ── 5. Upload OSS SARIF to GitHub Security tab ────────────────────────
      - name: Upload Snyk OSS SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()   # Upload even when Snyk step fails
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-oss

      # ── 6. Snyk Code (SAST) scan ──────────────────────────────────────────
      - name: Run Snyk Code – static analysis
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: >-
            --sarif-file-output=snyk-code.sarif
            --severity-threshold=${{ github.event.inputs.severity_threshold || 'medium' }}

      # ── 7. Upload Code SARIF to GitHub Security tab ───────────────────────
      - name: Upload Snyk Code SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      # ── 8. Snyk monitor (push events only) ────────────────────────────────
      - name: Install Snyk CLI
        if: github.event_name == 'push'
        run: npm install -g snyk

      - name: Authenticate Snyk CLI
        if: github.event_name == 'push'
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Monitor project on Snyk.io
        if: github.event_name == 'push'
        run: snyk monitor --all-projects --org=${{ vars.SNYK_ORG_ID }} || true
        # SNYK_ORG_ID: set as a repository variable (Actions > Variables)
        # Remove the || true if you want a failed monitor to fail the job
