name: Snyk Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'   # Weekly on Monday at 02:00 UTC
  workflow_dispatch:
    inputs:
      severity_threshold:
        description: 'Snyk severity threshold (low/medium/high/critical)'
        required: false
        default: 'medium'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snyk-scan:
    name: Snyk – Dependency & Code Scan
    runs-on: ubuntu-latest
    environment: snyk

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js setup ──────────────────────────────────────────────────
      # cache-dependency-path uses a glob – if no lock file exists the cache
      # step is simply skipped rather than erroring out.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # ── 3. Install dependencies (only when workers/ exists) ───────────────
      - name: Install dependencies in workers
        if: hashFiles('workers/package-lock.json') != ''
        working-directory: ./workers
        run: npm ci

      # ── 4. Install Snyk CLI ────────────────────────────────────────────────
      - name: Install Snyk CLI
        run: npm install -g snyk

      # ── 5. Authenticate Snyk CLI ───────────────────────────────────────────
      - name: Authenticate Snyk CLI
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # ── 6. Snyk test – open-source vulnerabilities ────────────────────────
      - name: Run Snyk test – open source vulnerabilities
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=${{ github.event.inputs.severity_threshold || 'medium' }} \
            --sarif-file-output=snyk-oss.sarif || true

      # ── 7. Upload OSS SARIF ────────────────────────────────────────────────
      - name: Upload Snyk OSS SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('snyk-oss.sarif') != ''
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-oss

      # ── 8. Snyk Code – SAST scan ──────────────────────────────────────────
      - name: Run Snyk Code – static analysis
        continue-on-error: true
        run: |
          snyk code test \
            --severity-threshold=${{ github.event.inputs.severity_threshold || 'medium' }} \
            --sarif-file-output=snyk-code.sarif || true

      # ── 9. Upload Code SARIF ───────────────────────────────────────────────
      - name: Upload Snyk Code SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('snyk-code.sarif') != ''
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      # ── 10. Snyk monitor (push events only) ───────────────────────────────
      - name: Monitor project on Snyk.io
        if: github.event_name == 'push'
        run: snyk monitor --all-projects --org=${{ vars.SNYK_ORG_ID }} || true
