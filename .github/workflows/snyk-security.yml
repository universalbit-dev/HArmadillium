name: Snyk Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'   # Weekly on Monday at 02:00 UTC
  workflow_dispatch:
    inputs:
      severity_threshold:
        description: 'Snyk severity threshold (low/medium/high/critical)'
        required: false
        default: 'medium'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snyk-scan:
    name: Snyk – Dependency & Code Scan
    runs-on: ubuntu-latest
    environment: snyk

    permissions:
      contents: read
      security-events: write   # Required to upload SARIF results
      actions: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js setup with dependency caching ──────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: workers/package-lock.json

      # ── 3. Install project dependencies ───────────────────────────────────
      - name: Install dependencies in workers
        working-directory: ./workers
        run: npm ci

      # ── 4. Snyk vulnerability test – open-source (produces snyk-oss.sarif) ─
      - name: Run Snyk test – open source vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >-
            --all-projects
            --severity-threshold=${{ github.event.inputs.severity_threshold || 'medium' }}
            --sarif-file-output=snyk-oss.sarif

      # ── 5. Upload OSS SARIF – only when the file was actually created ──────
      - name: Upload Snyk OSS SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('snyk-oss.sarif') != ''
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-oss

      # ── 6. Install Snyk CLI (needed for code test + monitor) ──────────────
      - name: Install Snyk CLI
        run: npm install -g snyk

      # ── 7. Authenticate Snyk CLI ───────────────────────────────────────────
      - name: Authenticate Snyk CLI
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # ── 8. Snyk Code – SAST scan (produces snyk-code.sarif) ───────────────
      # snyk/actions/node does NOT support "command: code test"; use the CLI directly.
      - name: Run Snyk Code – static analysis
        continue-on-error: true
        run: |
          snyk code test \
            --severity-threshold=${{ github.event.inputs.severity_threshold || 'medium' }} \
            --sarif-file-output=snyk-code.sarif || true

      # ── 9. Upload Code SARIF – only when the file was actually created ─────
      - name: Upload Snyk Code SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('snyk-code.sarif') != ''
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      # ── 10. Snyk monitor (push events only) ───────────────────────────────
      - name: Monitor project on Snyk.io
        if: github.event_name == 'push'
        run: snyk monitor --all-projects --org=${{ vars.SNYK_ORG_ID }} || true
        # SNYK_ORG_ID: set as a repository variable (Actions > Variables)
